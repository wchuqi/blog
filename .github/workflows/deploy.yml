# 自动构建并部署到 GitHub Pages
# 在仓库 Settings → Pages → Source 选择 "GitHub Actions" 即可启用
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的推送会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 项目站点（https://用户名.github.io/仓库名/）需要设置 base 为 /仓库名/。
      # 用户主页站点（用户名.github.io 仓库）则保持默认 "/"，把下面一行删掉或改成 "/"。
      - run: npm run build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
